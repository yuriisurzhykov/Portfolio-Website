name: Visual & Accessibility Tests

# Runs the Playwright visual-regression + accessibility suite (see frontend/tests/README.md) on
# every pull request and on every push to master. Both events run in the exact same
# compare-only mode (never --update-snapshots here) — master has a repository ruleset that
# blocks direct pushes even from Actions, so this workflow never tries to commit updated
# baselines itself. Instead, baselines are accepted BEFORE merging, from the PR itself, via the
# `/update-snapshots` comment command handled by accept-visual-baselines.yml. By the time a PR
# is merged its baselines are already correct, so this job's run on master is just a
# confirmation, not a place that ever needs to write back to the repo.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

permissions:
  # Still "write", not "read": the GitHub Pages publish steps below push to the (unprotected)
  # gh-pages branch. This job never touches master/tests/visual-snapshots, only gh-pages.
  contents: write
  pull-requests: write

concurrency:
  group: visual-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run tests
        working-directory: frontend
        run: npx playwright test

      - name: Determine report destination path
        id: report-dest
        if: always()
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "dir=reports/pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "dir=reports/master" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/playwright-report
          destination_dir: ${{ steps.report-dest.outputs.dir }}
          keep_files: true

      # gh-pages branch root only ever gets reports/** written to it (destination_dir above) —
      # nothing publishes an index.html at the actual root, so the bare Pages URL would 404
      # forever without this (not a propagation delay, it never resolves on its own).
      - name: Generate GitHub Pages root landing page
        if: always()
        run: node .github/scripts/generate-pages-index.mjs gh-pages-root "${{ github.repository }}"

      - name: Publish landing page to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-root
          keep_files: true

      - name: Build PR comment
        if: always() && github.event_name == 'pull_request'
        run: node .github/scripts/format-summary.mjs frontend/test-results/summary.json "${{ steps.report-dest.outputs.dir }}" "${{ github.repository }}"

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: frontend/pr-comment.md
