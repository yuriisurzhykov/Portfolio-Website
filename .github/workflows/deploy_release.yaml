name: Deploy to VPS
on:
  push:
    # Currently the tag set to weird name, just to not trigger CI/CD pipeline, since it's under construction
    tags: [ "sajskdjakjdkasjdkasjd" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            /srv/web/yuriisoft/deploy.sh
